<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>应用生态 - 抬头看路 | 应用商店情报中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f7f8fa;color:#222;padding:20px;line-height:1.6}
.container{max-width:1000px;margin:0 auto}
.header-bar{background:#165DFF;color:white;padding:14px 20px;border-radius:12px;margin-bottom:16px;font-size:16px;font-weight:600;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.time-info{font-size:13px;font-weight:normal;opacity:.95}
#countdown{color:#ffeb3b}
.head{margin-bottom:20px}
.title{font-size:22px;margin-bottom:8px}
.desc{color:#666;font-size:14px}
.loading{padding:30px;text-align:center;color:#666}
.item{background:#fff;border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tag{display:inline-block;background:#eef;padding:2px 8px;border-radius:6px;font-size:12px;color:#36c;margin-right:8px}
.item-title{font-size:18px;font-weight:600;margin:8px 0}
.summary{background:#f0f9ff;border-left:3px solid #165DFF;padding:10px 14px;margin:10px 0;border-radius:0 6px 6px 0;font-size:15px}
.summary strong{color:#165DFF}
.meta{font-size:13px;color:#888;margin-bottom:12px}
.impact{background:#edf5ff;border-left:3px solid #3683e0;padding:10px 14px;border-radius:0 6px 6px 0;margin:10px 0;font-size:14px}
.impact strong{color:#3683e0}
.link{color:#3683e0;text-decoration:none;font-size:14px}
.link:hover{text-decoration:underline}
.footer{margin-top:40px;text-align:center;color:#999;font-size:13px}
</style>

<div class="container">
  <div class="header-bar">
    <div>应用生态 - 抬头看路</div>
    <div class="time-info">
      数据更新：<span id="update-time">加载中...</span>｜
      下次更新：<span id="countdown">计算中...</span>
    </div>
  </div>
  <div class="head">
    <h1 class="title">应用商店全网情报监控</h1>
    <p class="desc">自动抓取：App Store、Google Play、OPPO、VIVO、小米 政策/榜单/合规/流量/算法动态</p>
  </div>
  <div id="loading" class="loading">正在加载每日最新情报...</div>
  <div id="list"></div>
  <div class="footer">每日自动更新｜AI自动摘要｜AI影响分析｜多源聚合</div>
</div>

<script>
const t=document.getElementById("update-time"),n=document.getElementById("countdown"),o=document.getElementById("list"),i=document.getElementById("loading");
async function e(){try{const s=await fetch("https://raw.githubusercontent.com/13701464544-arch/appstore-monitor/main/data.json");
const a=await s.json();t.textContent=a.update_time||"自动更新",i.style.display="none";
let l="";a.news.forEach(s=>{l+=`
<div class="item">
<span class="tag">${s.tag}</span>
<div class="item-title">${s.title}</div>
<div class="summary"><strong>核心提炼：</strong>${s.summary}</div>
<div class="meta">${s.source} · ${s.time}</div>
<div class="impact"><strong>影响分析：</strong>${s.impact}</div>
<a href="${s.link}" target="_blank" class="link">查看原文</a>
</div>`});o.innerHTML=l}catch(s){i.innerText="加载完成，展示最新情报"}}
function s(){const a=new Date,l=new Date(a);l.setDate(a.getDate()+1),l.setHours(0,0,0,0);
const r=l-a,u=Math.floor(r/36e5),c=Math.floor(r%36e5/6e4),d=Math.floor(r%6e4/1e3);
n.textContent=`${u}h ${c}m ${d}s`}
setInterval(s,1e3),s(),window.onload=e;
</script>
</html>
