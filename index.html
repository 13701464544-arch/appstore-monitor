<!DOCTYPE html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>应用商店情报监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#f7f8fa;padding:20px}
.container{max-width:900px;margin:0 auto}
.header{background:#1677ff;color:white;padding:16px 20px;border-radius:12px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:600}
.info{font-size:14px;opacity:.9}
.card{background:white;border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:13px;background:#e6f0ff;color:#1677ff;margin-bottom:10px}
.title-text{font-size:16px;font-weight:600;margin-bottom:10px;color:#222}
.summary{font-size:14px;color:#444;margin-bottom:8px;line-height:1.5}
.impact{font-size:14px;color:#666;line-height:1.5}
</style>

<div class="container">
  <div class="header">
    <div class="title">应用生态 - 应用商店情报监控</div>
    <div class="info">
      更新：<span id="update-time">--</span><br>
      下次刷新：<span id="countdown">--</span>
    </div>
  </div>
  <div id="list"></div>
</div>

<script>
const REFRESH = 60 * 60 * 1000;

function startCountdown() {
  let t = REFRESH;
  setInterval(() => {
    t -= 1000;
    if (t <= 0) {
      location.reload();
      return;
    }
    const m = Math.floor(t / 60000);
    const s = Math.floor((t % 60000) / 1000);
    document.getElementById("countdown").textContent = `${m}分${s}秒`;
  }, 1000);
}

async function loadData() {
  try {
    const res = await fetch("data.json");
    const data = await res.json();
    document.getElementById("update-time").textContent = data.update_time;
    const list = document.getElementById("list");
    data.news.forEach(item => {
      const html = `
        <div class="card">
          <div class="tag">${item.tag}</div>
          <div class="title-text">${item.title}</div>
          <div class="summary"><strong>核心提炼：</strong>${item.summary}</div>
          <div class="impact"><strong>影响分析：</strong>${item.impact}</div>
        </div>
      `;
      list.innerHTML += html;
    });
  } catch (e) {
    document.getElementById("list").innerHTML = "<div>加载中…</div>";
  }
}

window.onload = () => {
  loadData();
  startCountdown();
};
</script>
