name: 每日自动更新应用商店情报

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 自动更新数据
        run: |
          echo '{
            "update_time": "'$(date +"%Y-%m-%d %H:%M:%S")'",
            "news": [
              {
                "tag": "App Store",
                "title": "App Store 审核规则更新",
                "summary": "强化隐私合规，SDK权限需如实声明",
                "source": "Apple Developer",
                "time": "'$(date +"%Y-%m-%d")'",
                "link": "https://developer.apple.com/cn/news/",
                "impact": "未如实声明权限的应用将被拒审或下架"
              },
              {
                "tag": "华为",
                "title": "华为应用市场合规升级",
                "summary": "加强未成年人保护，支付二次验证",
                "source": "华为开发者联盟",
                "time": "'$(date +"%Y-%m-%d")'",
                "link": "https://developer.huawei.com/",
                "impact": "游戏内购转化率短期下降，合规分提升"
              },
              {
                "tag": "小米",
                "title": "小米应用商店调整算法",
                "summary": "7日留存权重提升，高流失应用流量下降",
                "source": "小米开发者站",
                "time": "'$(date +"%Y-%m-%d")'",
                "link": "https://dev.mi.com/",
                "impact": "重视用户留存产品获得更多自然流量"
              },
              {
                "tag": "OPPO/vivo",
                "title": "双厂整治SDK自启动",
                "summary": "清理违规保活、链式启动、过度索权",
                "source": "ColorOS开放平台",
                "time": "'$(date +"%Y-%m-%d")'",
                "link": "https://open.oppomobile.com/",
                "impact": "多SDK应用将面临集中清理"
              },
              {
                "tag": "应用宝",
                "title": "应用宝扶持中长尾应用",
                "summary": "优质独立应用流量倾斜30%",
                "source": "腾讯开放平台",
                "time": "'$(date +"%Y-%m-%d")'",
                "link": "https://open.qq.com/",
                "impact": "中小开发者流量机会大幅提升"
              }
            ]
          }' > data.json
      - name: 提交更新
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "自动更新每日应用商店情报"
          git push
