name: 每60分钟自动爬取
on:
  schedule:
    - cron: "*/60 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖 & 运行
        run: |
          python3 -m pip install requests
          python3 spider.py

      - name: 提交更新
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新"
          git push
