name: 每60分钟自动爬取应用商店情报
on:
  schedule:
    - cron: "*/60 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-22.04
    env:
      ACTIONS_ALLOW_UNSECURE_NODE_VERSION: true
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖并运行
        run: |
          python3 -m pip install requests
          python3 spider.py

      - name: 提交更新
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git diff --quiet || git commit -m "自动更新情报"
          git push
