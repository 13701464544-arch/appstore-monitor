name: 每60分钟自动更新
on:
  schedule:
    - cron: "*/60 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 直接克隆并执行
        run: |
          git clone https://github.com/${{ github.repository }}.git app
          cd app
          python3 spider.py
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "auto update" || true
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
