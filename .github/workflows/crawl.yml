name: 自动更新情报
on:
  schedule:
    - cron: "*/60 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run
        run: python3 spider.py
      - name: Commit
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "update" || true
          git push || true
