name: 自动更新情报
on:
  schedule:
    - cron: "*/60 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          ACTIONS_ALLOW_UNSECURE_NODE_VERSION: true

      - name: 直接运行脚本
        run: python3 spider.py

      - name: 强制提交（永不报错）
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "update" || true
          git push || true
