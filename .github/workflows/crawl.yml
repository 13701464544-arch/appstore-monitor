name: 每60分钟自动爬取
on:
  schedule:
    - cron: "*/60 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          ACTIONS_ALLOW_UNSECURE_NODE_VERSION: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        env:
          ACTIONS_ALLOW_UNSECURE_NODE_VERSION: true

      - name: Install & Run
        run: |
          python -m pip install requests
          python spider.py

      - name: Push
        uses: EndBug/add-and-commit@v9
        with:
          message: "自动更新情报"
          add: "data.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
