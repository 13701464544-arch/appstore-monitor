name: 每60分钟自动爬取应用商店情报
on:
  schedule:
    - cron: "*/60 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-22.04
    steps:
      - name: 直接克隆仓库（彻底不用JS Action）
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git clone https://github.com/${{ github.repository }}.git repo
          cd repo

      - name: 运行爬虫
        run: |
          cd repo
          python3 -m pip install requests
          python3 spider.py

      - name: 提交并推送
        run: |
          cd repo
          git add data.json
          git diff --quiet || git commit -m "自动更新情报"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
